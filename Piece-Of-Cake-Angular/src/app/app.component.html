<h1 id="tableLabel">Dishes</h1>

<p>This component demonstrates fetching data from the server.</p>

<p *ngIf="!dishes"><em>Loading... Please refresh once the ASP.NET backend has started. See <a href="https://aka.ms/jspsintegrationangular">https://aka.ms/jspsintegrationangular</a> for more details.</em></p>

<table *ngIf="dishes">
    <thead>
        <tr>
          <th>Id</th>
          <th>Name</th>
          <th>Description</th>
          <th>State</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let dish of dishes">
          <td>{{ dish.id }}</td>
          <td>{{ dish.name }}</td>
          <td>{{ dish.description }}</td>
          <td>{{ dish.state }}</td>
        </tr>
    </tbody>
</table>
